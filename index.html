<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Airfinity 🌎</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Header -->
    <header id="app-header" class="hidden">
        <div class="logo">🌎 Airfinity</div>
        <nav>
            <span class="nav-link" onclick="app.showProfile()">Profile</span>
            <span class="nav-link" onclick="app.showFeed()">Feed</span>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        
        <!-- SECTION: Onboarding (Flash Card Style) -->
        <section id="onboarding">
            <!-- Progress Bar (Fixed Top) -->
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <!-- Card Container -->
            <div id="card-container" class="card-enter">
                <!-- Content injected via JS -->
            </div>

            <!-- Navigation Buttons (Fixed Bottom) -->
            <div class="onboarding-nav">
                <button id="btn-back" class="btn btn-ghost hidden" onclick="onboarding.prevStep()">Back</button>
                <button id="btn-next" class="btn btn-primary" onclick="onboarding.nextStep()">Next</button>
            </div>
        </section>

        <!-- SECTION: Feed (TikTok Style) -->
        <section id="feed" class="hidden">
            <!-- Feed items injected via JS -->
        </section>

        <!-- SECTION: Profile -->
        <section id="profile" class="hidden">
            <div class="profile-header">
                <div class="avatar" id="profile-avatar">?</div>
                <h2 id="profile-name">User</h2>
                <p class="text-muted">Traveler Profile</p>
            </div>
            
            <div class="profile-section">
                <h3>My Preferences</h3>
                <div id="profile-prefs" class="pref-list"></div>
            </div>

            <div class="profile-section">
                <h3>Saved Locations</h3>
                <div id="profile-saved" class="saved-list">
                    <p class="text-muted">No saved locations yet.</p>
                </div>
            </div>
            
            <button class="btn btn-danger btn-block" onclick="app.resetApp()">Reset Profile</button>
        </section>

    </main>

    <!-- Details Modal -->
    <div id="modal">
        <div class="modal-content">
            <div class="modal-hero">
                <img src="" alt="" class="modal-img" id="modal-img">
                <button class="modal-close" onclick="app.closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <h2 id="modal-title">Location Name</h2>
                <div class="match-badge" id="modal-score">95% Match</div>
                <p id="modal-desc" class="text-muted">Description...</p>
                
                <div id="modal-tags" class="feed-tags"></div>

                <div style="margin-top: 30px;">
                    <button class="btn btn-primary btn-block" id="modal-save-btn">Save Location</button>
                    <a href="#" target="_blank" id="modal-book-btn" class="btn btn-outline btn-block book-link">Book Now</a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
